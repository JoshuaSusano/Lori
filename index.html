<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Style Player</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: Arial, sans-serif;

  /* Daisy background with yellow overlay */
  background: 
    linear-gradient(rgba(255, 241, 118, 0.7), rgba(255, 241, 118, 0.7)),
    url('daisy.jpg');

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* PLAYER CARD */
.player {
  width: 320px;
  background: rgba(18, 18, 18, 0.85);
  backdrop-filter: blur(10px);
  border-radius: 25px;
  padding: 20px;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* VIDEO HOLDER (YELLOW FRAME) */
.video-box {
  background: #ffeb3b;
  padding: 10px;
  border-radius: 20px;
}

video {
  width: 100%;
  border-radius: 15px;
}

/* SONG INFO */
.info {
  margin-top: 15px;
}

.title {
  font-size: 16px;
  font-weight: bold;
}

.artist {
  font-size: 13px;
  color: #b3b3b3;
}

/* PROGRESS BAR */
.progress-container {
  margin: 15px 0;
}

.progress {
  width: 100%;
  cursor: pointer;
}

/* CONTROLS */
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
}

.controls button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

/* PLAY BUTTON */
.play-btn {
  background: #ffeb3b;
  color: black;
  border-radius: 50%;
  padding: 12px 16px;
  font-weight: bold;
  transition: 0.3s;
}

.play-btn:hover {
  background: #fdd835;
  transform: scale(1.1);
}

/* NOTE */
.note {
  margin-top: 15px;
  text-align: center;
  font-size: 14px;
  color: #fffde7;
}

</style>
</head>

<body>

<div class="player">

  <div class="video-box">
    <video id="video" src="lori.mp4"></video>
  </div>

  <div class="info">
    <div class="title">Best Part</div>
    <div class="artist">Daniel Caesar & H.E.R.</div>
  </div>

  <div class="progress-container">
    <input type="range" id="progress" value="0" class="progress">
  </div>

  <div class="controls">
    <button onclick="skip(-10)">⏮</button>
    <button class="play-btn" id="playBtn">▶</button>
    <button onclick="skip(10)">⏭</button>
  </div>

  <div class="note">
    Good morning hon! I made this for you. I Love you so much! Hope you have a great day! 💛
  </div>

</div>

<script>
const video = document.getElementById("video");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");

// Play / Pause
playBtn.addEventListener("click", () => {
  if (video.paused) {
    video.play();
    playBtn.textContent = "⏸";
  } else {
    video.pause();
    playBtn.textContent = "▶";
  }
});

// Update progress bar
video.addEventListener("timeupdate", () => {
  if (video.duration) {
    progress.value = (video.currentTime / video.duration) * 100;
  }
});

// Seek video
progress.addEventListener("input", () => {
  if (video.duration) {
    video.currentTime = (progress.value / 100) * video.duration;
  }
});

// Skip forward/backward
function skip(seconds) {
  video.currentTime += seconds;
}
</script>

</body>
</html>
