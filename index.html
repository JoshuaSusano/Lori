<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Morning Surprise</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      background-color: #fff176; /* yellow background */
      background-image: url('daisy.jpg'); /* your daisy image */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .player-container {
      background: rgba(0, 0, 0, 0.85);
      padding: 25px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
      color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .player-container video {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .note {
      font-size: 18px;
      font-weight: bold;
      color: #fffde7; /* off-white for contrast */
      text-align: center;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .controls button {
      background: #ffeb3b; /* Spotify yellow style button */
      color: #000;
      border: none;
      padding: 10px 18px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .controls button:hover {
      background: #fdd835; /* slightly darker yellow on hover */
      transform: scale(1.05);
    }

  </style>
</head>
<body>

  <div class="player-container">
    <video id="loriVideo" src="lori.mp4" autoplay muted loop></video>
    
    <div class="controls">
      <button id="playPause">Pause</button>
    </div>

    <div class="note">
      Good morning hon! I created and hosted a website for you 💛
    </div>
  </div>

  <script>
    const video = document.getElementById('loriVideo');
    const btn = document.getElementById('playPause');

    btn.addEventListener('click', () => {
      if (video.paused) {
        video.play();
        btn.textContent = 'Pause';
      } else {
        video.pause();
        btn.textContent = 'Play';
      }
    });
  </script>
</body>
</html>
