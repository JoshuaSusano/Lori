<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOR MY FUTURE WIFE</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:url('daisy.jpg') center/cover no-repeat;
}

/* PLAYER */

.player{
  width:90%;
  max-width:360px;
  aspect-ratio:9/16;
  background:rgba(18,18,18,0.9);
  backdrop-filter:blur(10px);
  border-radius:30px;
  padding:20px;
  color:white;
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* VIDEO HOLDER */

.video-box{
  background:#ffeb3b;
  padding:10px;
  border-radius:20px;
  height:430px;
}

video{
  width:100%;
  height:410px;
  object-fit:cover;
  border-radius:15px;
}

/* INFO */

.info{
  margin-top:10px;
}

.title{
  font-size:18px;
  font-weight:bold;
}

.artist{
  font-size:14px;
  color:#b3b3b3;
}

/* PROGRESS */

.progress-container{
  margin:15px 0;
}

.progress{
  width:100%;
}

/* CONTROLS */

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
}

.controls button{
  background:none;
  border:none;
  color:white;
  font-size:20px;
  cursor:pointer;
}

/* PLAY BUTTON */

.play-btn{
  background:#ffeb3b;
  color:black;
  border-radius:50%;
  padding:14px 18px;
  font-weight:bold;
  transition:0.3s;
}

.play-btn:hover{
  transform:scale(1.1);
}

/* LETTER AREA */

.note{
  text-align:center;
  font-size:14px;
  color:#fffde7;
  margin-top:10px;
  min-height:120px;
}

/* BUTTON */

.reveal-btn{
  background:#ffeb3b;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.reveal-btn:hover{
  transform:scale(1.05);
}

</style>
</head>

<body>

<div class="player">

  <div>

    <div class="video-box">
      <!-- VIDEO: Silent, autoplay, loop -->
      <video id="video" autoplay loop muted playsinline>
        <source src="lori.mp4" type="video/mp4">
      </video>
    </div>

    <!-- BACKGROUND MUSIC -->
    <audio id="bgMusic" autoplay loop>
      <source src="daylight.mp3" type="audio/mp3">
    </audio>

    <div class="info">
      <div class="title">Daylight</div>
      <div class="artist">Taylor Swift</div>
    </div>

  </div>

  <div>

    <div class="progress-container">
      <input type="range" id="progress" value="0" class="progress">
    </div>

    <div class="controls">
      <button onclick="skip(-10)">⏮</button>
      <button class="play-btn" id="playBtn">▶</button>
      <button onclick="skip(10)">⏭</button>
    </div>

    <div class="note">
      <button class="reveal-btn" onclick="revealLetter()">Click Me 💌</button>
      <p id="letter"></p>
    </div>

  </div>

</div>

<script>

const video = document.getElementById("video");
const bgMusic = document.getElementById("bgMusic");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");

/* Autoplay video (silent) and music */
window.addEventListener("load", () => {
  video.play().catch(()=>{});
  bgMusic.play().catch(()=>{});
});

/* Play / Pause BOTH video + music */
playBtn.addEventListener("click", () => {
  if(video.paused){
    video.play();
    bgMusic.play();
    playBtn.textContent="⏸";
  } else {
    video.pause();
    bgMusic.pause();
    playBtn.textContent="▶";
  }
});

/* Progress bar updates */
video.addEventListener("timeupdate", () => {
  if(video.duration){
    progress.value = (video.currentTime / video.duration) * 100;
  }
});

/* Seek video */
progress.addEventListener("input", () => {
  if(video.duration){
    video.currentTime = (progress.value / 100) * video.duration;
  }
});

/* Skip video */
function skip(seconds){
  video.currentTime += seconds;
}

/* TYPEWRITER LETTER */
function revealLetter(){
  document.querySelector(".reveal-btn").style.display="none";

  const message = `Good morning, my Honeyyy! 💛💛 

“Love is patient, love is kind.” – 1 Corinthians 13:4

Our love is like a masterpiece in a museum,
timeless, cherished, and admired every single day.

I thank God for another day to explore the gallery of our memories together.
May your day be filled with peace, joy, and blessings.

Remember that you are the most precious artwork in my heart,
loved, appreciated, and always in my prayers. I love you so muchh!

Have a beautiful day. 😚😚`;

  let i = 0;
  const speed = 40; // milliseconds per character
  const letter = document.getElementById("letter");

  function typeWriter(){
    if(i < message.length){
      letter.innerHTML += message.charAt(i);
      i++;
      setTimeout(typeWriter, speed);
    }
  }

  typeWriter();
}

</script>

</body>
</html>
